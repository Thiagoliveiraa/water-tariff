spring:
  application:
    name: water-tariff
  datasource:
    url: "jdbc:postgresql://localhost:5432/dbwatertariff"
    username: "${POSTGRES_USER:dbuserwatertariff}"
    password: "${POSTGRES_PASS:dbpasswatertariff}"
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  sql:
    init:
      mode: always


